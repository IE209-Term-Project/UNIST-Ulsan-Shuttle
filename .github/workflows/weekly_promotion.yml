name: Weekly Promotion Agent

# 매주 월요일 00시(KST) = 일요일 15시(UTC)에 Promotion Agent 자동 실행
# - 직전 4주 데이터로 평가
# - 권고가 있으면 다음 월요일자로 자동 적용
# - 관리자 이메일(ADMIN_EMAIL)로 결과 발송

on:
  schedule:
    - cron: '0 15 * * 0'   # 일요일 15:00 UTC = 월요일 00:00 KST
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  run-promotion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/promotion/run on HF Space
        env:
          API_URL: ${{ secrets.SHUTTLE_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "ERROR: SHUTTLE_API_URL secret not set"
            exit 1
          fi
          echo "Triggering Promotion Agent at $API_URL"
          response=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/api/promotion/run")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          echo "Status: $status"
          if [ "$status" -ne 200 ]; then
            echo "ERROR: non-200 response"
            exit 1
          fi
