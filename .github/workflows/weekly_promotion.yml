name: Weekly Promotion Agent

# 매주 월요일 00시(KST) = 일요일 15시(UTC)에 자동 실행:
# 1) Promotion Agent — 직전 4주 데이터 평가 → 다음 월요일자 자동 적용
# 2) Semester Agent — 학기 1주차일 때만 baseline 전환
# 3) Weekly Report   — 직전 주(Mon~Sun) 운영 보고서 xlsx 관리자 메일 발송
# 모든 결과는 관리자 이메일(ADMIN_EMAIL)로 알림

on:
  schedule:
    - cron: '0 15 * * 0'   # 일요일 15:00 UTC = 월요일 00:00 KST
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  run-promotion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/promotion/run on HF Space
        env:
          API_URL: ${{ secrets.SHUTTLE_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "ERROR: SHUTTLE_API_URL secret not set"
            exit 1
          fi
          echo "[Promotion Agent] $API_URL"
          response=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/api/promotion/run")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          [ "$status" -eq 200 ] || { echo "ERROR: status $status"; exit 1; }

      - name: Trigger /api/semester/run on HF Space (학기 1주차일 때만 실작동)
        env:
          API_URL: ${{ secrets.SHUTTLE_API_URL }}
        run: |
          echo "[Semester Agent] $API_URL"
          response=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/api/semester/run")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          [ "$status" -eq 200 ] || { echo "ERROR: status $status"; exit 1; }

      - name: Trigger /api/weekly_report/send (직전 주 보고서 발송)
        env:
          API_URL: ${{ secrets.SHUTTLE_API_URL }}
        run: |
          echo "[Weekly Report] $API_URL"
          response=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/api/weekly_report/send")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          [ "$status" -eq 200 ] || { echo "WARN: status $status (보고서 발송 실패 — 다른 잡은 계속)"; }
