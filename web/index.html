<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIST ↔ 울산역 셔틀 예약</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased;
         font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                      "Pretendard", "Segoe UI", Roboto, sans-serif; }
  .nav-blur { backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
  select, input { font-family: inherit; }
  .card { box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 30px rgba(0,0,0,.06); }
  .toast { animation: pop .35s cubic-bezier(.16,1,.3,1); }
  @keyframes pop { from { opacity:0; transform: translateY(-12px) scale(.98);} to {opacity:1; transform:none;} }
</style>
</head>
<body class="bg-[#fbfbfd] text-gray-900">

<!-- Nav -->
<nav class="nav-blur bg-white/70 fixed top-0 inset-x-0 z-50 border-b border-black/5">
  <div class="max-w-5xl mx-auto px-6 h-12 flex items-center justify-between text-[13px]">
    <a href="index.html" class="font-semibold tracking-tight">UNIST Shuttle</a>
    <div class="flex items-center gap-6 text-gray-500">
      <a href="#reserve" class="hover:text-gray-900 transition">예약</a>
      <a href="#carpool" class="hover:text-gray-900 transition">카풀</a>
      <a href="#alerts" class="hover:text-gray-900 transition">알림</a>
    </div>
  </div>
</nav>

<!-- Toast -->
<div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 hidden">
  <div class="toast bg-black text-white text-sm rounded-full px-5 py-2.5 shadow-lg max-w-[90vw]"></div>
</div>

<main class="max-w-2xl mx-auto px-6 pt-24 pb-24">
  <header class="text-center mb-12">
    <h1 class="text-4xl sm:text-5xl font-bold tracking-tight">울산역 셔틀 예약</h1>
    <p class="mt-3 text-lg text-gray-500">시각을 고르면, 에이전트가 배차·카풀·알림까지 처리합니다.</p>
  </header>

  <!-- Reserve card -->
  <section id="reserve" class="bg-white rounded-3xl p-7 card mb-8">
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-2">이름</label>
        <input id="name" placeholder="홍길동"
               class="w-full rounded-2xl bg-gray-100 px-4 py-3 outline-none focus:ring-2 ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-2">방향</label>
        <div class="grid grid-cols-2 gap-2" id="dir">
          <button data-v="to_station" class="dir-btn rounded-2xl py-3 text-sm font-medium bg-blue-600 text-white">울산역 방향</button>
          <button data-v="to_campus" class="dir-btn rounded-2xl py-3 text-sm font-medium bg-gray-100">캠퍼스 방향</button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-2">입력 방식</label>
        <div class="grid grid-cols-2 gap-2" id="mode">
          <button data-v="train" class="mode-btn rounded-2xl py-3 text-sm font-medium bg-blue-600 text-white">기차 연계</button>
          <button data-v="time" class="mode-btn rounded-2xl py-3 text-sm font-medium bg-gray-100">단순 이동</button>
        </div>
      </div>
      <div id="trainBox">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-500 mb-2">방면</label>
            <select id="bound" class="w-full rounded-2xl bg-gray-100 px-4 py-3 outline-none"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-500 mb-2">열차 시각</label>
            <select id="train" class="w-full rounded-2xl bg-gray-100 px-4 py-3 outline-none"></select>
          </div>
        </div>
      </div>
      <div id="timeBox" class="hidden">
        <label class="block text-sm font-medium text-gray-500 mb-2">출발 희망 시각 (HH:MM)</label>
        <input id="desire" placeholder="13:40" class="w-full rounded-2xl bg-gray-100 px-4 py-3 outline-none focus:ring-2 ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-2">날짜</label>
        <input id="date" type="date" class="w-full rounded-2xl bg-gray-100 px-4 py-3 outline-none">
      </div>

      <div class="flex gap-3 pt-1">
        <button onclick="checkStatus()" class="flex-1 rounded-2xl py-3.5 font-medium bg-gray-100 hover:bg-gray-200 transition">현황 보기</button>
        <button onclick="reserve()" class="flex-[2] rounded-2xl py-3.5 font-semibold bg-blue-600 text-white hover:bg-blue-700 transition">예약하기</button>
      </div>
    </div>
    <div id="result" class="hidden mt-5 rounded-2xl bg-blue-50 text-blue-900 p-4 text-[15px] leading-relaxed"></div>
  </section>

  <!-- Carpool -->
  <section id="carpool" class="bg-white rounded-3xl p-7 card mb-8">
    <h2 class="text-xl font-semibold mb-1">🚕 카풀</h2>
    <p class="text-gray-500 text-sm mb-4">셔틀이 없을 때 같은 시각 학생끼리 최대 4명 그룹으로 자동 편성됩니다.</p>
    <div class="flex gap-3">
      <button onclick="carpoolSignup()" class="flex-1 rounded-2xl py-3 font-medium bg-gray-900 text-white hover:bg-gray-700 transition">카풀 신청</button>
      <button onclick="carpoolFinalize()" class="flex-1 rounded-2xl py-3 font-medium bg-gray-100 hover:bg-gray-200 transition">지금 확정(데모)</button>
    </div>
    <div id="carpoolOut" class="hidden mt-4 rounded-2xl bg-gray-50 p-4 text-[15px] leading-relaxed"></div>
  </section>

  <!-- Alerts -->
  <section id="alerts" class="bg-white rounded-3xl p-7 card">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-xl font-semibold">🔔 실시간 알림</h2>
      <button onclick="checkAlerts()" class="text-sm text-blue-600 font-medium hover:underline">지금 체크</button>
    </div>
    <button onclick="simDelay()" class="w-full mb-4 rounded-2xl py-2.5 text-sm font-medium bg-amber-50 text-amber-700 hover:bg-amber-100 transition">⚠️ 지연 시뮬레이션 (데모)</button>
    <ul id="feed" class="space-y-2 text-[15px] text-gray-700"><li class="text-gray-400">알림 없음</li></ul>
  </section>
</main>

<footer class="py-10 text-center text-sm text-gray-400">UNIST 생산운영관리 텀프로젝트 · 2026</footer>

<script>
const state = { direction: 'to_station', mode: 'train' };
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast'); t.querySelector('div').textContent = msg;
  t.classList.remove('hidden'); clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.add('hidden'), 4000);
}
function pickGroup(sel, value) {
  document.querySelectorAll(sel).forEach(b => {
    const on = b.dataset.v === value;
    b.classList.toggle('bg-blue-600', on && sel==='.dir-btn' || on && sel==='.mode-btn');
    b.classList.toggle('text-white', on);
    b.classList.toggle('bg-gray-100', !on);
  });
}
document.querySelectorAll('.dir-btn').forEach(b => b.onclick = () => { state.direction=b.dataset.v; pickGroup('.dir-btn', b.dataset.v); });
document.querySelectorAll('.mode-btn').forEach(b => b.onclick = () => {
  state.mode=b.dataset.v; pickGroup('.mode-btn', b.dataset.v);
  $('trainBox').classList.toggle('hidden', b.dataset.v!=='train');
  $('timeBox').classList.toggle('hidden', b.dataset.v!=='time');
});

let TT = {};
async function init() {
  $('date').value = new Date().toISOString().slice(0,10);
  TT = await (await fetch('/api/timetable')).json();
  const bsel = $('bound');
  bsel.innerHTML = Object.entries(TT).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('');
  fillTrains();
  bsel.onchange = fillTrains;
  refreshFeed();
  setInterval(pollAlerts, 15000);
}
function fillTrains() {
  const b = $('bound').value;
  $('train').innerHTML = (TT[b]?.options||[]).map(o => `<option value="${o}">${o}</option>`).join('');
}
function payload() {
  return { name: $('name').value||'학생', direction: state.direction, mode: state.mode,
           train_time: $('train').value, desire_time: $('desire').value, travel_date: $('date').value };
}
async function post(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{})});
  return r.json();
}
async function checkStatus() {
  const d = await post('/api/status', payload());
  if (!d.ok) return toast('⚠️ ' + d.info);
  const svc = d.service==='fixed'?'고정 셔틀':d.service==='conditional'?'조건부 셔틀':'배차 셔틀 없음';
  const sh = d.shuttle_time? ` (${d.shuttle_time} 출발)`:'';
  show('result', `📋 ${d.travel_date} ${d.ktx_time} · 예약 ${d.reservations}/${d.n_star}명<br>🚌 ${svc}${sh}`);
}
async function reserve() {
  const d = await post('/api/reserve', payload());
  if (!d.ok) return toast('⚠️ ' + d.info);
  show('result', d.message);
  (d.new_alerts||[]).forEach(m => toast('🔔 ' + m));
  refreshFeed();
}
async function carpoolSignup() {
  const d = await post('/api/carpool/signup', payload());
  if (!d.ok) return toast('⚠️ ' + d.info);
  show('carpoolOut', d.message);
}
async function carpoolFinalize() {
  const d = await post('/api/carpool/finalize');
  show('carpoolOut', (d.groups||[]).join('<br>') || '카풀 신청 없음');
}
async function checkAlerts() { const d = await post('/api/notify/check'); d.new?.forEach(m=>toast('🔔 '+m)); refreshFeed(); }
async function simDelay() { const d = await post('/api/notify/delay'); d.new?.forEach(m=>toast('🔔 '+m)); refreshFeed(); }
async function pollAlerts() { const d = await post('/api/notify/check'); if (d.new?.length) d.new.forEach(m=>toast('🔔 '+m)); refreshFeed(); }
async function refreshFeed() {
  const d = await (await fetch('/api/notifications')).json();
  const ul = $('feed');
  ul.innerHTML = (d.notifications||[]).length
    ? d.notifications.map(m=>`<li class="border-b border-gray-100 pb-2">${m}</li>`).join('')
    : '<li class="text-gray-400">알림 없음</li>';
}
function show(id, html) { const e=$(id); e.innerHTML=html; e.classList.remove('hidden'); }
init();
</script>
</body>
</html>
